name: Build APK

on:
  push:
    branches: [main, "claude/**"]
    tags: ["v*"]
    paths:
      - "app/**"
      - "*.gradle"
      - "*.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - ".github/workflows/build-apk.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "*.gradle"
      - "*.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-keyboard-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/*.apk

      # Rolling prerelease so scripts/bootstrap.sh can always fetch the
      # newest APK from a stable URL without authentication:
      # https://github.com/<repo>/releases/download/latest-apk/app-debug.apk
      - name: Update rolling latest-apk release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Latest APK (main)
          prerelease: true
          body: |
            Rolling build of the latest `main` commit. Updated automatically by CI.
            Used by `scripts/bootstrap.sh` for one-command phone setup.
          files: app/build/outputs/apk/debug/*.apk

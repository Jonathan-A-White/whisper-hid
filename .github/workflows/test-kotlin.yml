name: Kotlin Tests

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "app/**"
      - "*.gradle"
      - "*.gradle.kts"
      - "gradle/**"
      - "gradlew"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "*.gradle"
      - "*.gradle.kts"
      - "gradle/**"
      - "gradlew"

jobs:
  kotlin-tests:
    name: Kotlin Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test

name: Python Tests

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "scripts/**"

jobs:
  python-tests:
    name: Python Whisper Server Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install flask pytest

      - name: Run tests
        run: pytest scripts/tests/ -v
